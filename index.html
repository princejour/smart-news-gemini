<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة الأخبار الذكية</title>
<style>
body{margin:0;font-family:system-ui,Tahoma,Arial;background:#f4f7fb;color:#111827}.header{background:linear-gradient(135deg,#061a40,#0f62fe);color:white;padding:18px 14px;position:sticky;top:0;z-index:10;box-shadow:0 8px 24px #0003}.wrap{max-width:1150px;margin:auto}.top{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;gap:10px;align-items:center}.logo{width:46px;height:46px;border-radius:16px;background:#ffffff25;display:grid;place-items:center;font-size:24px}h1{font-size:22px;margin:0}.sub{margin:4px 0 0;color:#ffffffcc;font-size:13px}.status{background:#ffffff20;border:1px solid #ffffff35;border-radius:999px;padding:8px 12px;font-size:12px}.tabs{display:flex;gap:8px;overflow:auto;margin-top:14px}.tab{border:1px solid #ffffff30;background:#ffffff18;color:white;border-radius:999px;padding:10px 13px;font-weight:800;white-space:nowrap}.tab.active{background:white;color:#0f3f91}.main{max-width:1150px;margin:18px auto 50px;padding:0 14px}.warn{display:none;background:#fff7ed;border:1px solid #fed7aa;color:#7c2d12;padding:12px;border-radius:14px;margin-bottom:14px}.warn.show{display:block}.panel{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}.panel h2{margin:0;font-size:25px}.panel p{margin:5px 0 0;color:#6b7280}.actions{display:flex;gap:8px}.btn{border:0;border-radius:13px;padding:11px 13px;font-weight:900;cursor:pointer;background:#111827;color:white}.btn.primary{background:#0f62fe}.btn.light{background:white;color:#111827;border:1px solid #e5e7eb}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}.card{background:white;border:1px solid #e5e7eb;border-radius:18px;overflow:hidden;box-shadow:0 12px 32px #0f172a1a;display:flex;flex-direction:column}.thumb{aspect-ratio:16/9;background:#e5e7eb;position:relative}.thumb img,.hero img{width:100%;height:100%;object-fit:cover;display:block}.badge{position:absolute;top:10px;right:10px;background:#0f172ad1;color:white;border-radius:999px;padding:6px 9px;font-size:12px;font-weight:900}.card-body{padding:14px;display:flex;flex-direction:column;gap:9px;flex:1}.card h3{margin:0;font-size:18px;line-height:1.45}.summary{margin:0;color:#4b5563;font-size:14px;line-height:1.75}.meta{margin-top:auto;color:#6b7280;font-size:12px}.read{border-radius:13px;padding:11px 12px;background:#eff6ff;color:#073b8f;font-weight:900;border:1px solid #bfdbfe;cursor:pointer}.loader,.empty{background:white;border:1px solid #e5e7eb;border-radius:18px;padding:24px;text-align:center;color:#6b7280;box-shadow:0 12px 32px #0f172a1a}.spin{width:34px;height:34px;border:4px solid #dbeafe;border-top-color:#0f62fe;border-radius:50%;margin:0 auto 12px;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.article-view{display:none}.back{margin-bottom:14px}.article{background:white;border:1px solid #e5e7eb;border-radius:24px;box-shadow:0 12px 32px #0f172a1a;overflow:hidden}.hero{height:min(460px,55vw);background:#e5e7eb}.article-content{max-width:860px;margin:auto;padding:22px 18px 34px}.article-content h1{font-size:31px;line-height:1.45}.article-meta{display:flex;gap:8px;flex-wrap:wrap;color:#6b7280;font-size:13px}.article-body p{font-size:18px;line-height:2.05}.hidden-source{display:none}.footer{text-align:center;color:#6b7280;font-size:13px;padding:25px 14px 40px}@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}.panel{display:block}.actions{margin-top:10px}.actions .btn{flex:1}}@media(max-width:560px){h1{font-size:18px}.sub{font-size:12px}.status{display:none}.grid{grid-template-columns:1fr}.article-content h1{font-size:24px}.article-body p{font-size:16px}}
</style>
</head>
<body>
<header class="header"><div class="wrap"><div class="top"><div class="brand"><div class="logo">📰</div><div><h1>بوابة الأخبار الذكية</h1><p class="sub">نسخة Netlify Functions</p></div></div><div id="status" class="status">جاري التهيئة...</div></div><nav id="tabs" class="tabs"></nav></div></header>
<main class="main"><div id="warning" class="warn"></div><section id="homeView"><div class="panel"><div><h2 id="sectionTitle">الأخبار</h2><p id="sectionDesc">تحديث تلقائي كل 10 دقائق عند فتح الموقع.</p></div><div class="actions"><button id="refreshBtn" class="btn primary" type="button">تحديث الآن</button><button id="clearBtn" class="btn light" type="button">مسح الكاش</button></div></div><div id="content"></div></section><section id="articleView" class="article-view"><button id="backBtn" class="btn light back" type="button">← رجوع إلى الأخبار</button><article class="article"><div id="articleHero" class="hero"></div><div class="article-content"><div id="articleMeta" class="article-meta"></div><h1 id="articleTitle"></h1><div id="articleBody" class="article-body"></div><div id="internalSource" class="hidden-source"></div></div></article></section></main>
<footer class="footer">© بوابة الأخبار الذكية</footer>
<script src="app.js" defer></script>
</body>
</html>
